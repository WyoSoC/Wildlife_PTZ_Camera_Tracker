name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group:              pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        run: npm run build:pages
        # Outputs to <repo-root>/dist/pages/  (vite outDir = '../dist/pages')

      - name: Verify build output exists
        run: |
          echo "=== dist/pages contents ==="
          ls -lh dist/pages/
          ls -lh dist/pages/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages   # relative to repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
